name: Build Floracene Dagit image

# Builds the Floracene "Conduit" Dagit image (fork webserver + built UI on stock
# Dagster) and publishes it to GHCR. The conduit tenant image builds FROM this.
# Tracking the eventual standalone Next.js rewrite: floracene/conduit#3.

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'js_modules/**'
      - 'python_modules/dagster-webserver/**'
      - 'floracene/**'
      - '.github/workflows/build-floracene-dagit.yml'

concurrency:
  group: floracene-dagit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/floracene/holocene-dagit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: floracene/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
