name: Build Floracene Dagit image

# Builds the Floracene "Conduit" Dagit image (fork webserver + built UI on stock
# Dagster) and publishes it to Amazon ECR via GitHub OIDC — no long-lived AWS
# keys, no registry PAT. The conduit tenant image builds FROM this; the box pulls
# it with its instance IAM role.
#
# Required repo configuration (Settings -> Secrets and variables -> Actions -> Variables):
#   AWS_ROLE_ARN     arn of the OIDC push role that trusts repo:floracene/holocene:*
#   AWS_REGION       optional, defaults to us-east-2
#   ECR_REPOSITORY   optional, defaults to holocene-dagit
#
# Tracking the eventual standalone Next.js rewrite: floracene/conduit#3.

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'js_modules/**'
      - 'python_modules/dagster-webserver/**'
      - 'floracene/**'
      - '.github/workflows/build-floracene-dagit.yml'

concurrency:
  group: floracene-dagit-${{ github.ref }}
  cancel-in-progress: true

# id-token: write is what lets the runner assume the AWS role via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || 'holocene-dagit' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: floracene/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
